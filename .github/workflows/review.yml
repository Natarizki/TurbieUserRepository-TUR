name: TUR Package Review
# Runs on every PR submission — validates TURBUILD and notifies maintainers

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'packages/**'

jobs:
  validate:
    name: Validate TURBUILD
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get changed TURBUILDs
        id: changed
        run: |
          CHANGED=$(git diff --name-only origin/main HEAD \
            | grep "^packages/.*/TURBUILD$" || echo "")
          echo "files=$CHANGED" >> $GITHUB_OUTPUT

      - name: Validate each TURBUILD
        run: |
          python3 scripts/validate-turbuild.py \
            ${{ steps.changed.outputs.files }}

      - name: Security scan
        run: |
          bash scripts/security-scan.sh \
            ${{ steps.changed.outputs.files }}

      - name: Post validation result
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.existsSync('validation-report.md')
              ? fs.readFileSync('validation-report.md', 'utf8')
              : '✅ All checks passed!';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 TUR Bot Validation Report\n\n${report}\n\n---\n*Waiting for maintainer review...*`
            });

  notify-maintainers:
    name: Notify Maintainers
    needs: validate
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Parse package info
        id: info
        run: |
          TURBUILD=$(git diff --name-only origin/main HEAD \
            | grep "^packages/.*/TURBUILD$" | head -1)
          if [ -n "$TURBUILD" ]; then
            NAME=$(grep "^name" "$TURBUILD" | cut -d= -f2 | xargs)
            VERSION=$(grep "^version" "$TURBUILD" | cut -d= -f2 | xargs)
            DESC=$(grep "^description" "$TURBUILD" | cut -d= -f2 | xargs)
            MAINTAINER=$(grep "^maintainer" "$TURBUILD" | cut -d= -f2 | xargs)
            echo "name=$NAME" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "desc=$DESC" >> $GITHUB_OUTPUT
            echo "maintainer=$MAINTAINER" >> $GITHUB_OUTPUT
          fi

      - name: Request maintainer review
        uses: actions/github-script@v7
        with:
          script: |
            // Add review label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-review', 'tur-submission']
            });

            // Request review from maintainers team
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              team_reviewers: ['turbie-maintainers']
            });
